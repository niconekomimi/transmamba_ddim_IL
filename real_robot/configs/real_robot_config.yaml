defaults:
  - _self_
  - /agents: ddim_agent
  - trainers: real_trainer

hydra:
  searchpath:
    - file://${oc.env:PWD}/configs
  run:
    dir: ${log_dir}/runs/${agent_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: True
  sweep:
    dir: ${log_dir}/sweeps/${agent_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.override_dirname}

agent_name: ddim_encdec_transformer_mamba_real
log_dir: real_robot/outputs

wandb:
  entity: 673269043-wuhan-university-of-science-and-technology
  project: fast_mail_real_robot
  mode: online

group: real_${agent_name}

seed: 42

dataset_path: ${oc.env:PWD}/real_robot/data
train_split: train
val_split: val
val_ratio: 0.1
task_name: null
task_description: null
task_embedding_path: null

window_size: 10
obs_seq_len: 1
act_seq_len: ${window_size}
multistep: ${window_size}
goal_window_size: 1
goal_conditioned: True

use_pos_emb: True
num_sampling_steps: 4
ddim_steps: 4
eta: 0.0
if_use_ema: True

obs_tokens: 2

train_batch_size: 64
val_batch_size: 32
num_workers: 4
device: cuda
epoch: 100
eval_every_n_epochs: 1
scale_data: True
scaler_type: minmax
checkpoint_every_n_epochs: 10

obs_dim: 9
action_dim: 7
state_dim: 110
max_len_data: 260

if_robot_states: False

camera_names:
  - agentview
  - eye_in_hand

shape_meta:
  obs:
    agentview_image:
      shape: [3, 224, 224]
      type: rgb
    eye_in_hand_image:
      shape: [3, 224, 224]
      type: rgb

n_embd: 512
goal_dim: 512
latent_dim: 512

encoder_n_layer: 4
decoder_n_layer: 6
n_heads: 4

Mamba_type: Mamba1

mamba_n_layer_encoder: 5
mamba_encoder_cfg:
  layer: ${Mamba_type}
  d_state: 64
  d_conv: 4
  expand: 2

mamba_n_layer_decoder: 10
mamba_decoder_cfg:
  layer: ${Mamba_type}
  d_state: 64
  d_conv: 4
  expand: 2

xlstm_encoder_blocks: 4
xlstm_encoder_vocab_size: 14
xlstm_encoder_chunkwise_kernel: parallel--native_autograd
xlstm_encoder_mode: train
xlstm_encoder_adaLN_zero: False
xlstm_encoder_in_context_cond: False

xlstm_decoder_blocks: 8
xlstm_decoder_vocab_size: 10
xlstm_decoder_chunkwise_kernel: parallel--native_autograd
xlstm_decoder_mode: train
xlstm_decoder_adaLN_zero: True
xlstm_decoder_in_context_cond: False

trainset:
  _target_: real_robot.datasets.real_robot_dataset.RealRobotDataset
  data_directory: ${dataset_path}
  split: ${train_split}
  window_size: ${window_size}
  action_dim: ${action_dim}
  state_dim: ${state_dim}
  camera_names: ${camera_names}
  max_episodes: null
  val_ratio: ${val_ratio}
  task_name: ${task_name}
  task_description: ${task_description}
  task_embedding_path: ${task_embedding_path}

valset:
  _target_: real_robot.datasets.real_robot_dataset.RealRobotDataset
  data_directory: ${dataset_path}
  split: ${val_split}
  window_size: ${window_size}
  action_dim: ${action_dim}
  state_dim: ${state_dim}
  camera_names: ${camera_names}
  max_episodes: null
  val_ratio: ${val_ratio}
  task_name: ${task_name}
  task_description: ${task_description}
  task_embedding_path: ${task_embedding_path}
