_target_: agents.ddpm_agent.DDPM_Agent
_recursive_: false

defaults:
  - model: ddpm/ddpm_dec_xlstm
  - obs_encoders: resnet
  - language_encoders: clip

optimization:
  _target_: torch.optim.Adam
  lr: 1e-4
  weight_decay: 0

obs_seq_len: ${obs_seq_len}
act_seq_len: ${act_seq_len}

# 推理期闭环重规划频率；默认等于 act_seq_len（保持旧版 chunk 开环执行）
replan_every: ${act_seq_len}

cam_names: ${camera_names}

if_robot_states: False
if_film_condition: False
device: ${device}
state_dim: ${obs_dim}
latent_dim: ${latent_dim}

