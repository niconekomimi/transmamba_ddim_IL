defaults:
  - _self_
  - agents: bc_agent
  - trainers: base_trainer

agent_name: beso
log_dir: logs/robocasa/

wandb:
  entity: 673269043-wuhan-university-of-science-and-technology
  project: fast_mail_robocasa

group: bc_robocasa
sim_only: false

hydra:
  mode: MULTIRUN # needed for launcher to be used
  run:
    dir: ${log_dir}/runs/${agent_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: True
  sweep:
    dir: ${log_dir}/sweeps/${agent_name}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.override_dirname}
  # launcher:
  #   account: hk-project-sustainebot
  #   timeout_min: 720
  #   name: robocasa #${hydra.job.name}
  #   partition: accelerated
  #   gres: gpu:1

seed: 42

# dataset config
env_name:
  - PnPCounterToCab   # 原 PnPCabToCounter
#  - PnPStoveToCounter
#  - PnPSinkToCounter
#  - CloseSingleDoor
#  - OpenDrawer
#  - CoffeePressButton
dataset_path: /home/public/wyl/X_IL/robocasa/datasets/v0.1/single_stage/
# dataset_path: /hkfs/work/workspace/scratch/ll6323-david_dataset_2/robocasa_datasets/v0.1/single_stage/kitchen_pnp/PnPCabToCounter/2024-04-24/processed_demo_${img_width}_${img_height}.hdf5

##########################################################################################
# Model Setting
##########################################################################################
obs_seq_len: 1
pred_seq_len: 10
window_size: ${add:${obs_seq_len},${pred_seq_len},-1}

act_seq_len: 10
multistep: ${window_size} # only for inference, could be different from act_seq_len

goal_window_size: 1
goal_conditioned: True

use_pos_emb: True
num_sampling_steps: 4
ddim_steps: 4
eta: 0.0

if_use_ema: True

##########################################################################################
# Training
##########################################################################################
train_batch_size: 256
val_batch_size: 64
num_workers: 12
device: 'cuda'
epoch: 1
eval_every_n_epochs: 1
scale_data: True
scaler_type: 'standard'

##########################################################################################
# Environment
##########################################################################################
obs_dim: 13
action_dim: 7
state_dim: 0  # robocasa dataset currently doesn't use state_dim; kept for config parity
max_len_data: 260
global_action: False

# obs_tokens: obs_seq_len * len(obs_modalities)
obs_tokens: 3

##########################################################################################
# Observations
##########################################################################################
if_robot_states: False
img_width: 128
img_height: 128

camera_names:
  # - robot0_agentview_center
  - robot0_agentview_left
  - robot0_agentview_right
  - robot0_eye_in_hand

shape_meta:
  obs:
    robot0_agentview_left_image:
      shape:
        - 3
        - ${img_height}
        - ${img_width}
      type: rgb
    robot0_agentview_right_image:
      shape:
        - 3
        - ${img_height}
        - ${img_width}
      type: rgb
    robot0_eye_in_hand_image:
      shape:
        - 3
        - ${img_height}
        - ${img_width}
      type: rgb
##########################################################################################
# Common Parameters
##########################################################################################
n_embd: 256
goal_dim: 512
latent_dim: 512

traj_per_task: 0
val_start_idx: 0

##########################################################################################
# Transformer Parameters (encoder-decoder)
##########################################################################################
encoder_n_layer: 4
decoder_n_layer: 6
n_heads: 4

##########################################################################################
# Mamba Parameters
##########################################################################################
Mamba_type: Mamba1

mamba_n_layer_encoder: 4
mamba_encoder_cfg:
  layer: ${Mamba_type}
  d_state: 64
  d_conv: 4
  expand: 2

mamba_n_layer_decoder: 8
mamba_decoder_cfg:
  layer: ${Mamba_type}
  d_state: 64
  d_conv: 4
  expand: 2

##########################################################################################
# xLSTM Parameters
##########################################################################################
xlstm_encoder_blocks: 16
xlstm_encoder_vocab_size: 0
xlstm_encoder_chunkwise_kernel: "parallel--native_autograd"
xlstm_encoder_mode: "train"
xlstm_encoder_adaLN_zero: False
xlstm_encoder_in_context_cond: False

xlstm_decoder_blocks: 16
xlstm_decoder_vocab_size: 0
xlstm_decoder_chunkwise_kernel: "parallel--native_autograd"
xlstm_decoder_mode: "train"
xlstm_decoder_adaLN_zero: False
xlstm_decoder_in_context_cond: False

##########################################################################################
# Dataset
##########################################################################################

trainset:
  _target_: environments.dataset.robocasa_dataset_memory.RobocasaDataset
  data_directory: ${dataset_path}
  env_name: ${env_name}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  cam_names: ${camera_names}
  device: ${device}
  max_len_data: ${max_len_data}
  window_size: ${window_size}
  global_action: ${global_action}

valset:
  _target_: environments.dataset.robocasa_dataset_memory.RobocasaDataset
  data_directory: ${dataset_path}
  env_name: ${env_name}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  cam_names: ${camera_names}
  device: ${device}
  max_len_data: ${max_len_data}
  window_size: ${window_size}
  global_action: ${global_action}
  # start_idx: ${val_start_idx}

##########################################################################################
# Simulation
##########################################################################################

simulation:
  _target_: simulation.robocasa_sim.RoboCasaSim
  env_name: ${env_name}
  camera_names: ${camera_names}
  seed: ${seed}
  device: ${device}
  img_height: ${img_height}
  img_width: ${img_width}
  num_episode: 1
  max_step_per_episode: 400
  render: True
  n_cores: 1
  if_vision: True
  global_action: ${global_action}
